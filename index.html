<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  background: #1a1a1a;
  text-align: center;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  padding: 10px 14px;
  border-radius: 12px;
  max-width: 75%;
  white-space: pre-wrap;
}

.user {
  align-self: flex-end;
  background: #2b7cff;
}

.bot {
  align-self: flex-start;
  background: #2a2a2a;
}

.inputBox {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px 16px;
  background: #2b7cff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>⚡ OpenRouter Chat</header>

<div id="chat"></div>

<div class="inputBox">
  <input id="input" placeholder="پیامت رو بنویس..." />
  <button onclick="send()">Send</button>
</div>

<script>

const API_KEY = "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";

const chat = document.getElementById("chat");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  const bot = document.createElement("div");
  bot.className = "msg bot";
  bot.innerText = "thinking...";
  chat.appendChild(bot);

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json",
        "HTTP-Referer": window.location.href,
        "X-Title": "My Chatbot"
      },
      body: JSON.stringify({
        model: "openrouter/auto",
        messages: [
          { role: "user", content: text }
        ]
      })
    });

    const data = await res.json();

    bot.innerText = data.choices?.[0]?.message?.content || "error";

  } catch (err) {
    bot.innerText = "connection error";
  }
}

document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
