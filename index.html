<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>AI GOD CHAT</title>

<!-- PWA -->
<link rel="manifest" href="data:application/manifest+json,{
\"name\":\"AI GOD CHAT\",
\"short_name\":\"GOD CHAT\",
\"start_url\":\".\",
\"display\":\"standalone\",
\"background_color\":\"#0b0b0b\",
\"theme_color\":\"#0b0b0b\"
}">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:system-ui;
background:#0b0b0b;
color:#fff;
height:100vh;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#111;
border-right:1px solid #222;
display:flex;
flex-direction:column;
padding:10px;
gap:10px;
}

.sidebar button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2b7cff;
color:white;
}

.chatList{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.chatItem{
padding:8px;
background:#1a1a1a;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
padding:12px;
background:#111;
text-align:center;
border-bottom:1px solid #222;
font-weight:600;
}

#chat{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:80%;
padding:12px;
border-radius:14px;
white-space:pre-wrap;
}

.user{align-self:flex-end;background:#2b7cff}
.bot{align-self:flex-start;background:#1a1a1a;border:1px solid #2a2a2a}

/* INPUT */
.bar{
display:flex;
padding:10px;
gap:8px;
background:#111;
border-top:1px solid #222;
}

input{
flex:1;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:#1a1a1a;
color:white;
}

button{
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.send{background:#2b7cff;color:white}
.stop{background:#ff3b30;color:white}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="newChat()">＋ New Chat</button>
<div class="chatList" id="chatList"></div>
</div>

<div class="main">

<div class="topbar">⚡ GOD MODE AI CHAT</div>

<div id="chat"></div>

<div class="bar">
<input id="input" placeholder="پیام..." />
<button class="send" onclick="send()">➤</button>
<button class="stop" onclick="stop()">✕</button>
</div>

</div>

<script>

const API_KEY = "PUT_YOUR_KEY_HERE";

let chats = JSON.parse(localStorage.getItem("chats")||"{}");
let current = localStorage.getItem("current") || "main";
let controller=null;

if(!chats[current]) chats[current]=[];

function save(){
localStorage.setItem("chats",JSON.stringify(chats));
localStorage.setItem("current",current);
}

function renderChats(){
const list=document.getElementById("chatList");
list.innerHTML="";
Object.keys(chats).forEach(id=>{
const div=document.createElement("div");
div.className="chatItem";
div.innerText=id;
div.onclick=()=>{current=id;render();};
list.appendChild(div);
});
}

function render(){
const chat=document.getElementById("chat");
chat.innerHTML="";
(chats[current]||[]).forEach(m=>{
const d=document.createElement("div");
d.className="msg "+(m.role==="user"?"user":"bot");
d.innerText=m.content;
chat.appendChild(d);
});
chat.scrollTop=chat.scrollHeight;
renderChats();
}

render();

/* STREAM FAKE + REAL RESPONSE */
async function send(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text)return;

input.value="";

if(!chats[current]) chats[current]=[];

chats[current].push({role:"user",content:text});
render();

const box=document.createElement("div");
box.className="msg bot";
box.innerText="...";
document.getElementById("chat").appendChild(box);

controller=new AbortController();

try{
const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
signal:controller.signal,
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json",
"HTTP-Referer":location.href,
"X-Title":"God Chat"
},
body:JSON.stringify({
model:"meta-llama/llama-3.1-8b-instruct",
messages:chats[current],
stream:false
})
});

const data=await res.json();
let reply=data.choices?.[0]?.message?.content || "error";

/* REALISTIC STREAM EFFECT */
box.innerText="";
let i=0;
let t=setInterval(()=>{
if(i<reply.length){
box.innerText+=reply[i++];
}else{
clearInterval(t);
chats[current].push({role:"assistant",content:reply});
save();
}
},8);

}catch(e){
box.innerText="error";
}

}

function stop(){
if(controller)controller.abort();
}

function newChat(){
let id="chat-"+Date.now();
chats[id]=[];
current=id;
save();
render();
}

</script>

</body>
</html>
