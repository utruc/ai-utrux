<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  display: flex;
  height: 100vh;
  flex-direction: column;
}

header {
  padding: 15px;
  background: #1a1a1a;
  text-align: center;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  padding: 12px 15px;
  border-radius: 12px;
  max-width: 75%;
  white-space: pre-wrap;
}

.user {
  align-self: flex-end;
  background: #2b7cff;
}

.bot {
  align-self: flex-start;
  background: #2a2a2a;
}

.inputBox {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px 16px;
  border: none;
  border-radius: 8px;
  background: #2b7cff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<header>⚡ AI Chat (Lite)</header>

<div id="chat"></div>

<div class="inputBox">
  <input id="input" placeholder="پیامت رو بنویس..." />
  <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  const botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.innerText = "⏳ در حال پاسخ...";
  chat.appendChild(botMsg);
  chat.scrollTop = chat.scrollHeight;

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);

    const res = await fetch(
      "https://text.pollinations.ai/" + encodeURIComponent(text),
      { signal: controller.signal }
    );

    clearTimeout(timeout);

    const data = await res.text();

    botMsg.innerText = data || "پاسخ خالی دریافت شد";
  } catch (err) {
    botMsg.innerText = "❌ خطا در دریافت پاسخ (API در دسترس نیست یا کند است)";
  }
}

document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
