<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utrux AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma,sans-serif;

    background:
    radial-gradient(circle at center,
    #1e3a8a 0%,
    #081229 35%,
    #020617 100%);

    min-height:100vh;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.back-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
}

.back-btn:hover{
    background:#3b82f6;
}

.title{
    font-size:32px;
    font-weight:bold;
}

.chat-box{
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    min-height:400px;
    margin-bottom:20px;
    overflow:auto;
}

.message{
    margin-bottom:15px;
    padding:12px;
    border-radius:12px;
    line-height:2;
}

.user{
    background:#2563eb;
}

.ai{
    background:rgba(255,255,255,.08);
}

.input-area{
    display:flex;
    gap:10px;
}

#question{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    outline:none;
    font-size:16px;
}

.send-btn{
    width:120px;
    border:none;
    border-radius:15px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.send-btn:hover{
    background:#3b82f6;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">

<div class="title">
🤖 Utrux AI
</div>

<button
class="back-btn"
onclick="window.location.href='https://utruc.github.io/browser/'">
🏠 بازگشت
</button>

</div>

<div id="chat" class="chat-box">

<div class="message ai">
سلام 👋
من هوش مصنوعی Utrux هستم.
سوالت را بپرس.
</div>

</div>

<div class="input-area">

<input
id="question"
placeholder="پیام خود را بنویسید...">

<button
class="send-btn"
onclick="askAI()">
ارسال
</button>

</div>

</div>

<script>

async function askAI(){

const input =
document.getElementById("question");

const question =
input.value.trim();

if(!question) return;

const chat =
document.getElementById("chat");

chat.innerHTML += `
<div class="message user">
${question}
</div>
`;

input.value = "";

chat.innerHTML += `
<div class="message ai" id="loading">
⏳ در حال فکر کردن...
</div>
`;

chat.scrollTop = chat.scrollHeight;

try{

const response =
await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AQ.Ab8RN6LU7MMJSbeO9WUO0zIzT99-0ZLTl7Lj3xr8x8BsIVsCXw",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:question
}
]
}
]
})
}
);

const data =
await response.json();

document
.getElementById("loading")
.remove();

const answer =
data.candidates?.[0]?.content?.parts?.[0]?.text
|| "پاسخی دریافت نشد";

chat.innerHTML += `
<div class="message ai">
${answer}
</div>
`;

chat.scrollTop = chat.scrollHeight;

}catch(err){

document
.getElementById("loading")
.remove();

chat.innerHTML += `
<div class="message ai">
❌ خطا در ارتباط با هوش مصنوعی
</div>
`;

}

}

document
.getElementById("question")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){
askAI();
}

}
);

</script>

</body>
</html>
