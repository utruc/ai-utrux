<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat ULTRA</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 220px;
  background: #151515;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sidebar button {
  padding: 10px;
  border: none;
  background: #2b7cff;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.chatArea {
  flex: 1;
  display: flex;
  flex-direction: column;
}

header {
  padding: 12px;
  background: #1a1a1a;
  text-align: center;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  padding: 10px 14px;
  border-radius: 12px;
  max-width: 75%;
  white-space: pre-wrap;
}

.user {
  align-self: flex-end;
  background: #2b7cff;
}

.bot {
  align-self: flex-start;
  background: #2a2a2a;
}

.inputBox {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
}

button.send {
  margin-left: 10px;
  padding: 12px 16px;
  background: #2b7cff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button.stop {
  margin-left: 5px;
  padding: 12px;
  background: red;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <button onclick="clearChat()">🧹 Clear</button>
</div>

<div class="chatArea">
  <header>⚡ AI CHAT ULTRA</header>

  <div id="chat"></div>

  <div class="inputBox">
    <input id="input" placeholder="پیامت رو بنویس..." />
    <button class="send" onclick="send()">Send</button>
    <button class="stop" onclick="stop()">Stop</button>
  </div>
</div>

<script>

const API_KEY = "PUT_YOUR_KEY_HERE";
const chat = document.getElementById("chat");

let messages = JSON.parse(localStorage.getItem("chat") || "[]");
let controller = null;

function save() {
  localStorage.setItem("chat", JSON.stringify(messages));
}

function render() {
  chat.innerHTML = "";
  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.role === "user" ? "user" : "bot");
    div.innerText = m.content;
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
}

render();

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  messages.push({ role: "user", content: text });
  addMsg(text, "user");
  save();

  const botMsg = addMsg("...", "bot");

  controller = new AbortController();

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      signal: controller.signal,
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json",
        "HTTP-Referer": window.location.href,
        "X-Title": "AI Chat ULTRA"
      },
      body: JSON.stringify({
        model: "meta-llama/llama-3.1-8b-instruct",
        messages: messages,
        stream: false
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "error";

    botMsg.innerText = reply;

    messages.push({ role: "assistant", content: reply });
    save();

  } catch (err) {
    botMsg.innerText = "error / stopped";
  }
}

function stop() {
  if (controller) controller.abort();
}

function clearChat() {
  messages = [];
  save();
  render();
}

function newChat() {
  clearChat();
}

document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
