<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>AI Chat Mobile</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b0b0b;
  color: white;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  padding: 14px;
  text-align: center;
  background: #111;
  font-weight: 600;
  font-size: 16px;
  border-bottom: 1px solid #222;
}

/* CHAT AREA */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* MESSAGE BUBBLES */
.msg {
  max-width: 85%;
  padding: 12px 14px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.4;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.user {
  align-self: flex-end;
  background: #2b7cff;
  border-bottom-right-radius: 6px;
}

.bot {
  align-self: flex-start;
  background: #1e1e1e;
  border-bottom-left-radius: 6px;
  border: 1px solid #2a2a2a;
}

/* INPUT BAR */
.inputBar {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: #111;
  border-top: 1px solid #222;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
}

/* INPUT */
input {
  flex: 1;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid #2a2a2a;
  outline: none;
  background: #1a1a1a;
  color: white;
  font-size: 15px;
}

/* BUTTONS */
button {
  min-width: 48px;
  padding: 12px 14px;
  border-radius: 14px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
}

/* SEND BUTTON */
.send {
  background: #2b7cff;
  color: white;
}

/* STOP BUTTON */
.stop {
  background: #ff3b30;
  color: white;
}

/* SCROLL BAR (optional clean) */
#chat::-webkit-scrollbar {
  width: 6px;
}
#chat::-webkit-scrollbar-thumb {
  background: #333;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>⚡ AI Chat</header>

<div id="chat"></div>

<div class="inputBar">
  <input id="input" placeholder="پیامت رو بنویس..." />
  <button class="send" onclick="send()">➤</button>
  <button class="stop" onclick="stop()">✕</button>
</div>

<script>

const API_KEY = "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";
const chat = document.getElementById("chat");

let messages = [];
let controller = null;

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  addMsg(text, "user");
  messages.push({ role: "user", content: text });

  const botMsg = addMsg("...", "bot");

  controller = new AbortController();

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      signal: controller.signal,
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json",
        "HTTP-Referer": window.location.href,
        "X-Title": "Mobile AI Chat"
      },
      body: JSON.stringify({
        model: "meta-llama/llama-3.1-8b-instruct",
        messages: messages,
        stream: false
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "error";

    botMsg.innerText = reply;
    messages.push({ role: "assistant", content: reply });

  } catch (err) {
    botMsg.innerText = "connection error";
  }
}

function stop() {
  if (controller) controller.abort();
}

document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

</script>

</body>
</html>
